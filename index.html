<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TOEFL Quest — Level Up Your English</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TOEFL QUEST — DESIGN SYSTEM
   Game-HUD aesthetic: deep indigo night + violet/gold accents
============================================================ */
:root{
  --bg:#15152b; --bg2:#1d1d3a; --bg3:#23234a;
  --violet:#7c5cfc; --violet-dim:#2e2858; --violet-glow:rgba(124,92,252,.35);
  --gold:#ffc857; --gold-dim:#4a3d1a;
  --mint:#3ddc97; --mint-dim:#163828;
  --coral:#ff6b6b; --coral-dim:#3a1f24;
  --ink:#f4f2ff; --ink-dim:#a8a4c9; --ink-faint:#6b6890;
  --border:#2e2a52; --border-light:#3a3568;
  --r-sm:8px; --r-md:14px; --r-lg:20px; --r-pill:999px;
  --ff-display:'Space Grotesk',sans-serif;
  --ff-body:'Inter',sans-serif;
  --ff-mono:'JetBrains Mono',monospace;
  --shadow-glow:0 0 0 1px var(--border), 0 8px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff-body);background:var(--bg);color:var(--ink);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
h1,h2,h3,h4{font-family:var(--ff-display);font-weight:700;letter-spacing:-.01em}
.mono{font-family:var(--ff-mono)}
.hidden{display:none!important}
a{color:inherit;text-decoration:none}
::selection{background:var(--violet);color:#fff}

@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ============================================================
   APP SHELL
============================================================ */
#app{display:flex;min-height:100vh}

/* ── CHARACTER PANEL (signature element) ── */
#charpanel{
  width:264px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:20px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;
}
.cp-logo{display:flex;align-items:center;gap:9px;font-family:var(--ff-display);font-size:18px;font-weight:700;color:var(--ink);margin-bottom:22px;padding:0 4px}
.cp-logo .bolt{width:26px;height:26px;flex-shrink:0}

/* Avatar / level ring */
.cp-avatar-wrap{display:flex;flex-direction:column;align-items:center;padding:14px 8px 18px;border-bottom:1px solid var(--border);margin-bottom:16px}
.cp-ring{position:relative;width:96px;height:96px;margin-bottom:10px}
.cp-ring svg{transform:rotate(-90deg);width:100%;height:100%}
.cp-ring-bg{fill:none;stroke:var(--bg3);stroke-width:7}
.cp-ring-fg{fill:none;stroke:url(#ringGrad);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.cp-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cp-level-num{font-family:var(--ff-display);font-size:28px;font-weight:700;color:var(--gold);line-height:1}
.cp-level-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-faint);font-weight:600;margin-top:1px}
.cp-name{font-weight:700;font-size:14.5px;margin-bottom:3px}
.cp-title{font-size:11.5px;color:var(--ink-dim)}
.cp-xp-row{display:flex;justify-content:space-between;width:100%;font-size:10.5px;color:var(--ink-faint);margin-top:10px;margin-bottom:4px;font-family:var(--ff-mono)}
.cp-xp-bar{width:100%;height:7px;background:var(--bg3);border-radius:var(--r-pill);overflow:hidden;position:relative}
.cp-xp-fill{height:100%;background:linear-gradient(90deg,var(--violet),var(--gold));border-radius:var(--r-pill);transition:width .8s cubic-bezier(.4,0,.2,1);position:relative}
.cp-xp-fill::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 2.2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(250%)}}

/* Streak */
.cp-streak{display:flex;align-items:center;gap:8px;background:var(--gold-dim);border:1px solid rgba(255,200,87,.3);border-radius:var(--r-md);padding:9px 12px;margin-bottom:16px}
.cp-streak .flame{font-size:18px;flex-shrink:0}
.cp-streak .num{font-family:var(--ff-mono);font-weight:700;font-size:15px;color:var(--gold)}
.cp-streak .lbl{font-size:10.5px;color:var(--ink-dim)}

/* Skill tree nav */
.cp-section-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-faint);font-weight:700;padding:10px 6px 6px}
.cp-nav{display:flex;flex-direction:column;gap:3px}
.cp-nav-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:var(--r-sm);font-size:13.5px;font-weight:600;color:var(--ink-dim);transition:.15s;position:relative;border:none;background:none;width:100%;text-align:left}
.cp-nav-item:hover{background:var(--bg3);color:var(--ink)}
.cp-nav-item.active{background:var(--violet-dim);color:var(--violet);box-shadow:inset 0 0 0 1px rgba(124,92,252,.3)}
.cp-nav-item .ic{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.cp-nav-item .mastery-dot{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--bg3);flex-shrink:0}
.cp-nav-item .mastery-dot.lit{background:var(--mint);box-shadow:0 0 6px var(--mint)}
.cp-nav-item .badge-count{margin-left:auto;font-family:var(--ff-mono);font-size:10px;color:var(--ink-faint);background:var(--bg3);padding:2px 6px;border-radius:var(--r-pill)}

.cp-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--border)}
.cp-stat-row{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-faint);padding:5px 6px;font-family:var(--ff-mono)}

/* ── MAIN AREA ── */
#main{flex:1;min-width:0;display:flex;flex-direction:column}
#topbar{
  height:64px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;position:sticky;top:0;background:rgba(21,21,43,.92);backdrop-filter:blur(10px);z-index:40;
}
#topbar h1{font-size:19px}
#topbar .sub{font-size:12.5px;color:var(--ink-faint);font-weight:500;margin-left:10px}
.tb-right{display:flex;align-items:center;gap:12px}
.hamburger{display:none;width:38px;height:38px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg2);align-items:center;justify-content:center;color:var(--ink)}

#content{padding:28px;flex:1}
.wrap{max-width:1180px;margin:0 auto}

/* ============================================================
   COMPONENTS
============================================================ */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px}
.card:hover{border-color:var(--border-light)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.card-head h3{font-size:17px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:var(--r-pill);border:1.5px solid transparent;font-weight:700;font-size:14px;transition:.15s;white-space:nowrap;font-family:var(--ff-body)}
.btn-primary{background:var(--violet);color:#fff;box-shadow:0 4px 18px rgba(124,92,252,.35)}
.btn-primary:hover{background:#8d6dff;transform:translateY(-1px);box-shadow:0 6px 22px rgba(124,92,252,.5)}
.btn-gold{background:var(--gold);color:#2a1d05}
.btn-gold:hover{background:#ffd573;transform:translateY(-1px)}
.btn-ghost{background:var(--bg3);border-color:var(--border);color:var(--ink)}
.btn-ghost:hover{border-color:var(--violet);color:var(--violet)}
.btn-sm{padding:8px 16px;font-size:12.5px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r-pill)}
.badge-violet{background:var(--violet-dim);color:#b8a4ff}
.badge-gold{background:var(--gold-dim);color:var(--gold)}
.badge-mint{background:var(--mint-dim);color:var(--mint)}
.badge-coral{background:var(--coral-dim);color:var(--coral)}

.pbar{height:8px;background:var(--bg3);border-radius:var(--r-pill);overflow:hidden}
.pbar>div{height:100%;border-radius:var(--r-pill);transition:width 1s cubic-bezier(.4,0,.2,1)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* ============================================================
   QUIZ ANSWER OPTIONS (Reading / Listening / Vocabulary)
============================================================ */
.rOpt,.lOpt,.vqOpt{transition:border-color .15s,background .15s,color .15s}
.rOpt:not(.locked):hover,.lOpt:not(.locked):hover,.vqOpt:not(.locked):hover{border-color:var(--violet);background:var(--bg3);color:var(--ink)}
.rOpt:has(input:focus-visible),.lOpt:has(input:focus-visible),.vqOpt:has(input:focus-visible){border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-glow)}

/* ============================================================
   QUEST CARDS (module selection tiles)
============================================================ */
.quest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.quest-card{
  background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:18px;
  cursor:pointer;transition:.2s;position:relative;overflow:hidden;
}
.quest-card:hover{border-color:var(--violet);transform:translateY(-3px);box-shadow:0 10px 28px rgba(124,92,252,.25)}
.quest-card.done{border-color:var(--mint)}
.quest-card .qc-icon{width:42px;height:42px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:12px}
.quest-card .qc-title{font-weight:700;font-size:14.5px;margin-bottom:4px}
.quest-card .qc-desc{font-size:12px;color:var(--ink-dim);margin-bottom:12px;line-height:1.5}
.quest-card .qc-foot{display:flex;justify-content:space-between;align-items:center;font-size:11px}
.quest-card .qc-xp{font-family:var(--ff-mono);color:var(--gold);font-weight:700}
.quest-card .qc-status{color:var(--ink-faint)}
.quest-card .qc-status.done{color:var(--mint)}
.quest-card .qc-check{position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;background:var(--mint);display:none;align-items:center;justify-content:center;font-size:12px;color:#06281a;font-weight:900}
.quest-card.done .qc-check{display:flex}

/* ============================================================
   XP TOAST / LEVEL UP
============================================================ */
#xp-toast-zone{position:fixed;top:80px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.xp-toast{background:var(--bg3);border:1px solid var(--gold);border-radius:var(--r-pill);padding:9px 18px;font-family:var(--ff-mono);font-weight:700;font-size:13.5px;color:var(--gold);box-shadow:0 6px 20px rgba(0,0,0,.4);opacity:0;transform:translateX(30px);transition:.3s}
.xp-toast.show{opacity:1;transform:translateX(0)}

#levelup-overlay{position:fixed;inset:0;background:rgba(10,10,24,.85);backdrop-filter:blur(6px);z-index:10000;display:none;align-items:center;justify-content:center;flex-direction:column}
#levelup-overlay.show{display:flex}
.lu-burst{font-size:56px;margin-bottom:6px;animation:pop .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.lu-title{font-family:var(--ff-display);font-size:34px;color:var(--gold);margin-bottom:6px;text-align:center}
.lu-sub{color:var(--ink-dim);font-size:15px;margin-bottom:24px;text-align:center}
.lu-level-badge{font-family:var(--ff-display);font-size:64px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--violet),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:24px}

/* ============================================================
   RESPONSIVE
============================================================ */
@media (max-width:980px){
  #charpanel{position:fixed;left:0;top:0;height:100vh;z-index:100;transform:translateX(-100%);transition:transform .25s;box-shadow:0 0 40px rgba(0,0,0,.5)}
  #charpanel.open{transform:translateX(0);background:#0a2040}
  body:has(#charpanel.open)::before{content:'';position:fixed;inset:0;background:rgba(4,12,26,.55);z-index:99}
  .hamburger{display:flex}
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
}
@media (max-width:600px){
  #content{padding:16px}
  #topbar{padding:0 16px}
}
</style>

}

}

  background:linear-gradient(180deg,rgba(47,111,177,.24),rgba(47,111,177,.14));

}

}

  border:1px solid rgba(255,255,255,.10);
  color:#fff;
}
#content{padding:26px}
.card,
.quest-card{

}

.card[style*="-dim),var(--bg2)"] h2{color:#fff}
tr[style*="background:var(--violet-dim)"] td{color:#fff}

  transition:transform .2s ease,box-shadow .2s ease,filter .2s ease;
}

}

}

}

  background:linear-gradient(180deg,#fff,#eef5fc);

}

}

}

/* ============================================================
   TOEFL QUEST — CORE ENGINE
   XP / Levels / Streaks / Navigation / Persistence
============================================================ */

const TITLES = [
  {lvl:1, name:"Beginner Explorer"}, {lvl:3, name:"Word Wanderer"}, {lvl:5, name:"Grammar Scout"},
  {lvl:8, name:"Fluency Apprentice"}, {lvl:12, name:"Comprehension Ranger"}, {lvl:16, name:"Discourse Knight"},
  {lvl:20, name:"Rhetoric Master"}, {lvl:25, name:"TOEFL Champion"}, {lvl:30, name:"Polyglot Legend"}
];

function defaultState(){
  return {
    xp:0, streak:0, lastActiveDate:null,
    questsDone:{}, // key: "reading_r1" -> true
    bossesDone:{}, // key: "mock1" -> {scores...}
    achievements:[],
  };
}

let STATE = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem('toeflquest_state');
    if(raw) return Object.assign(defaultState(), JSON.parse(raw));
  }catch(e){}
  return defaultState();
}
function saveState(){
  try{ localStorage.setItem('toeflquest_state', JSON.stringify(STATE)); }catch(e){}
}

function todayStr(){ return new Date().toISOString().slice(0,10); }

function checkDailyStreak(){
  const today = todayStr();
  if(STATE.lastActiveDate === today) return; // already counted today
  const y = new Date(); y.setDate(y.getDate()-1);
  const yesterday = y.toISOString().slice(0,10);
  if(STATE.lastActiveDate === yesterday){ STATE.streak++; }
  else if(STATE.lastActiveDate !== today){ STATE.streak = 1; }
  STATE.lastActiveDate = today;
  saveState();
}

function levelFromXP(xp){
  return Math.floor(Math.sqrt(xp/50)) + 1;
}
function xpForLevel(lvl){
  return Math.pow(lvl-1,2)*50;
}
function currentTitle(lvl){
  let t = TITLES[0].name;
  for(const item of TITLES){ if(lvl>=item.lvl) t=item.name; }
  return t;
}

function awardXP(amount, reason){
  const beforeLvl = levelFromXP(STATE.xp);
  STATE.xp += amount;
  const afterLvl = levelFromXP(STATE.xp);
  saveState();
  showXPToast(amount, reason);
  renderCharPanel();
  if(afterLvl > beforeLvl){ showLevelUp(afterLvl); }
}

function showXPToast(amount, reason){
  const zone = document.getElementById('xp-toast-zone');
  const t = document.createElement('div');
  t.className = 'xp-toast';
  t.textContent = `+${amount} XP ${reason?'· '+reason:''}`;
  zone.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 2400);
}

function showLevelUp(lvl){
  document.getElementById('luLevel').textContent = lvl;
  document.getElementById('luSub').textContent = `You've reached Level ${lvl} — ${currentTitle(lvl)}`;
  document.getElementById('levelup-overlay').classList.add('show');
}
function closeLevelUp(){ document.getElementById('levelup-overlay').classList.remove('show'); }

function markQuestDone(key, xp, label){
  if(!STATE.questsDone[key]){
    STATE.questsDone[key] = true;
    saveState();
    awardXP(xp, label||'Quest complete');
  }
}
function markBossDone(key, scoreObj, xp){
  STATE.bossesDone[key] = scoreObj;
  saveState();
  awardXP(xp, 'Boss defeated');
}

/* ── Render character panel ── */
function renderCharPanel(){
  const lvl = levelFromXP(STATE.xp);
  const curFloor = xpForLevel(lvl);
  const nextFloor = xpForLevel(lvl+1);
  const pct = Math.min(100, Math.round((STATE.xp-curFloor)/(nextFloor-curFloor)*100));
  const circ = 264;

  document.getElementById('cpLevelNum').textContent = lvl;
  document.getElementById('cpTitle').textContent = currentTitle(lvl);
  document.getElementById('cpXpCur').textContent = `${STATE.xp} XP`;
  document.getElementById('cpXpNext').textContent = `${nextFloor} XP`;
  document.getElementById('cpXpFill').style.width = pct+'%';
  document.getElementById('xpRing').setAttribute('stroke-dashoffset', circ*(1-pct/100));
  document.getElementById('cpStreak').textContent = STATE.streak;
  document.getElementById('tbXp').textContent = `${STATE.xp} XP`;

  const questCount = Object.keys(STATE.questsDone).length;
  const bossCount = Object.keys(STATE.bossesDone).length;
  document.getElementById('statQuests').textContent = questCount;
  document.getElementById('statBosses').textContent = bossCount;
  document.getElementById('statXP').textContent = STATE.xp;

  // Mastery dots: lit if section has >=3 quests done
  const sectionCounts = {reading:0,listening:0,speaking:0,writing:0,vocab:0};
  Object.keys(STATE.questsDone).forEach(k=>{
    const sec = k.split('_')[0];
    if(sectionCounts[sec]!==undefined) sectionCounts[sec]++;
  });
  ['reading','listening','speaking','writing','vocab'].forEach(sec=>{
    const dot = document.getElementById('dot'+sec.charAt(0).toUpperCase()+sec.slice(1));
    if(dot) dot.classList.toggle('lit', sectionCounts[sec]>=3);
  });
}

          <input type="radio" name="r-${id}-q${i}" value="${j}" style="margin-top:2px;accent-color:${data.color}" onchange="selectROpt('${id}',${i},${j})">

        </label>`).join('')}

let readingAnswers = {};
function selectROpt(id, qi, val){
  readingAnswers[id+'_'+qi] = val;
  document.querySelectorAll(`label[id^="r-${id}-q${qi}-"]`).forEach((el,j)=>{
    el.style.background = j===val ? 'var(--bg3)' : 'transparent';
    el.style.color = j===val ? 'var(--ink)' : '';
  });
}

function submitReadingQuest(id){
  const data = READING_DATA[id];
  let score = 0, answeredCount = 0;
  data.qs.forEach((q,i)=>{
    const chosen = readingAnswers[id+'_'+i];
    const opts = document.querySelectorAll(`label[id^="r-${id}-q${i}-"]`);
    if(chosen===undefined) return;
    answeredCount++;
    opts.forEach((el,j)=>{
      el.classList.add('locked');
      const radio = el.querySelector('input'); if(radio) radio.disabled=true;
      if(j===q.a){ el.style.borderColor='var(--mint)'; el.style.background='var(--mint-dim)'; el.style.color='var(--ink)'; }
      else if(j===chosen){ el.style.borderColor='var(--coral)'; el.style.background='var(--coral-dim)'; el.style.color='var(--ink)'; }
    });
    if(chosen===q.a) score++;
    // Add explanation
    const lastOpt = opts[opts.length-1];
    const expDiv = document.createElement('div');
    expDiv.style.cssText = 'margin-top:8px;padding:10px 12px;border-radius:8px;background:var(--violet-dim);font-size:12.5px;color:var(--ink-dim);line-height:1.6';
    expDiv.innerHTML = `<strong style="color:var(--violet)">Explanation:</strong> ${q.e}`;
    lastOpt.parentElement.appendChild(expDiv);
  });

  if(answeredCount===0){ alert('Select at least one answer first!'); return; }

  const resultBox = document.getElementById('rResultBox');
  const pct = Math.round(score/data.qs.length*100);
  resultBox.innerHTML = `
    <div style="text-align:center;padding:20px;background:var(--bg3);border-radius:var(--r-md);border:1.5px solid ${pct>=70?'var(--mint)':'var(--coral)'}">
      <div style="font-family:var(--ff-display);font-size:32px;color:${pct>=70?'var(--mint)':'var(--gold)'}">${score}/${data.qs.length}</div>
      <div style="color:var(--ink-dim);font-size:13.5px;margin-top:6px">${pct>=80?'🎉 Excellent work!':pct>=60?'👍 Good effort — review the explanations above.':'📖 Keep practicing — review each explanation carefully.'}</div>
    </div>`;
  document.getElementById('rSubmitBtn').disabled = true;
  markQuestDone('reading_'+id, 50, data.title+' complete');
}

function buildLWaveform(){
  const el = document.getElementById('lWaveform');
  el.innerHTML='';
  for(let i=0;i<32;i++){ const b=document.createElement('div'); b.style.cssText='width:3px;background:var(--violet);border-radius:2px;height:5px;transition:height .1s;opacity:.6'; el.appendChild(b); }
}
function animateLWaveform(on){
  const el = document.getElementById('lWaveform'); if(!el) return;
  clearInterval(el._iv);
  if(on) el._iv = setInterval(()=>el.querySelectorAll('div').forEach(b=>b.style.height=(Math.random()*26+4)+'px'),110);
  else el.querySelectorAll('div').forEach(b=>b.style.height='5px');
}

function lFmtTime(s){
  if (!isFinite(s) || s<0) s = 0;
  s = Math.round(s);
  return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
}
function lStripHtml(html){
  if (!html) return '';
  let s = String(html).replace(/<\/p>\s*<p>/gi, '. ').replace(/<[^>]+>/g, ' ');
  const ta = document.createElement('textarea');
  ta.innerHTML = s;
  return ta.value.replace(/\s+/g, ' ').trim();
}
function lPickVoice(){
  const voices = (window.speechSynthesis && speechSynthesis.getVoices()) || [];
  if (!voices.length) return null;
  const isUS = v => /en-US/i.test(v.lang);
  let v = voices.find(v => isUS(v) && /Natural|Neural/i.test(v.name));
  if (v) return v;
  v = voices.find(v => isUS(v) && /Online|Aria|Guy|Jenny|Samantha|Ava|Andrew|Emma/i.test(v.name));
  if (v) return v;
  v = voices.find(v => isUS(v) && /Google/i.test(v.name));
  if (v) return v;
  v = voices.find(isUS);
  if (v) return v;
  return voices.find(v => /^en/i.test(v.lang)) || voices[0];
}
let lAudioState = {};
function playListeningQuest(id){
  const data = LISTENING_DATA[id];
  const btn = document.getElementById('lPlayBtn');
  const st = lAudioState[id] || (lAudioState[id] = {elapsed:0, speaking:false, paused:false, tick:null});

  if (!('speechSynthesis' in window)){
    const errEl = document.getElementById('lAudioErr');
    if (errEl){ errEl.style.display = 'block'; errEl.textContent = '⚠ Audio unavailable: your browser does not support text-to-speech playback.'; }
    btn.disabled = true; btn.textContent = '⚠ Audio unavailable';
    return;
  }

  // Pause
  if (st.speaking && !st.paused){
    try{ speechSynthesis.pause(); }catch(e){}
    st.paused = true;
    clearInterval(st.tick);
    btn.textContent = '▶ Resume';
    animateLWaveform(false);
    return;
  }
  // Resume
  if (st.speaking && st.paused){
    try{ speechSynthesis.resume(); }catch(e){}
    st.paused = false;
    startLTicker(id);
    btn.textContent = '⏸ Pause';
    animateLWaveform(true);
    return;
  }

  // Fresh start (only allowed once per quest)
  try{
    speechSynthesis.cancel();
    const text = lStripHtml(data.transcript);
    const u = new SpeechSynthesisUtterance(text);
    try{
      const voice = lPickVoice();
      if (voice && voice.name && voice.lang) u.voice = voice;
    }catch(voiceErr){ /* fall back to default voice */ }
    u.rate = 1.0; u.pitch = 1.0;
    st.elapsed = 0; st.speaking = true; st.paused = false;
    document.getElementById('lAudioBar').style.width = '0%';
    document.getElementById('lAudioTime').textContent = '0:00';
    btn.textContent = '⏸ Pause';
    animateLWaveform(true);
    startLTicker(id);
    u.onend = () => {
      st.speaking = false; st.paused = false;
      clearInterval(st.tick);
      animateLWaveform(false);
      document.getElementById('lAudioBar').style.width = '100%';
      document.getElementById('lAudioTime').textContent = `0:${data.dur<10?'0':''}${data.dur}`;
      btn.textContent = '✓ Played';
      btn.disabled = true;
      document.getElementById('lQList').style.opacity = '1';
      document.getElementById('lQList').style.pointerEvents = 'auto';
      document.getElementById('lSubmitBtn').disabled = false;
    };
    u.onerror = (e) => {
      st.speaking = false;
      clearInterval(st.tick);
      animateLWaveform(false);
      if (e.error !== 'canceled' && e.error !== 'interrupted'){
        const errEl = document.getElementById('lAudioErr');
        if (errEl){ errEl.style.display = 'block'; errEl.textContent = '⚠ Speech playback failed in this browser. Tap play to try again.'; }
        btn.disabled = false; btn.textContent = '↻ Retry Play Audio';
      }
    };
    speechSynthesis.speak(u);
  }catch(startErr){
    const errEl = document.getElementById('lAudioErr');
    if (errEl){ errEl.style.display = 'block'; errEl.textContent = '⚠ Speech playback failed to start in this browser. Tap play to try again.'; }
    btn.disabled = false; btn.textContent = '↻ Retry Play Audio';
  }
}
function startLTicker(id){
  const data = LISTENING_DATA[id];
  const st = lAudioState[id];
  clearInterval(st.tick);
  st.tick = setInterval(()=>{
    if (st.paused) return;
    st.elapsed += 0.2;
    const pct = Math.min(100, (st.elapsed/data.dur)*100);
    const barEl = document.getElementById('lAudioBar'); if (barEl) barEl.style.width = pct+'%';
    const timeEl = document.getElementById('lAudioTime'); if (timeEl) timeEl.textContent = lFmtTime(st.elapsed);
    if (st.elapsed >= data.dur) clearInterval(st.tick);
  }, 200);
}

function toggleLTranscript(){
  document.getElementById('lTranscriptBox').classList.toggle('hidden');
}

let listeningAnswers = {};
function selectLOpt(id, qi, val){
  listeningAnswers[id+'_'+qi] = val;
  document.querySelectorAll(`label[id^="l-${id}-q${qi}-"]`).forEach((el,j)=>{
    el.style.background = j===val ? 'var(--bg3)' : 'transparent';
    el.style.color = j===val ? 'var(--ink)' : '';
  });
}

function submitListeningQuest(id){
  const data = LISTENING_DATA[id];
  let score = 0, answeredCount = 0;
  data.qs.forEach((q,i)=>{
    const chosen = listeningAnswers[id+'_'+i];
    const opts = document.querySelectorAll(`label[id^="l-${id}-q${i}-"]`);
    if(chosen===undefined) return;
    answeredCount++;
    opts.forEach((el,j)=>{
      const radio = el.querySelector('input'); if(radio) radio.disabled=true;
      if(j===q.a){ el.style.borderColor='var(--mint)'; el.style.background='var(--mint-dim)'; el.style.color='var(--ink)'; }
      else if(j===chosen){ el.style.borderColor='var(--coral)'; el.style.background='var(--coral-dim)'; el.style.color='var(--ink)'; }
    });
    if(chosen===q.a) score++;
    const lastOpt = opts[opts.length-1];
    const expDiv = document.createElement('div');
    expDiv.style.cssText = 'margin-top:8px;padding:10px 12px;border-radius:8px;background:var(--violet-dim);font-size:12.5px;color:var(--ink-dim);line-height:1.6';
    expDiv.innerHTML = `<strong style="color:var(--violet)">Explanation:</strong> ${q.e}`;
    lastOpt.parentElement.appendChild(expDiv);
  });

  if(answeredCount===0){ alert('Select at least one answer first!'); return; }

  const resultBox = document.getElementById('lResultBox');
  const pct = Math.round(score/data.qs.length*100);
  resultBox.innerHTML = `
    <div style="text-align:center;padding:20px;background:var(--bg3);border-radius:var(--r-md);border:1.5px solid ${pct>=70?'var(--mint)':'var(--coral)'}">
      <div style="font-family:var(--ff-display);font-size:32px;color:${pct>=70?'var(--mint)':'var(--gold)'}">${score}/${data.qs.length}</div>
      <div style="color:var(--ink-dim);font-size:13.5px;margin-top:6px">${pct>=80?'🎉 Excellent listening!':pct>=60?'👍 Good effort — review the explanations above.':'🎧 Keep practicing — review each explanation carefully.'}</div>
    </div>`;
  document.getElementById('lSubmitBtn').disabled = true;
  markQuestDone('listening_'+id, 50, data.title+' complete');
}

function beginSpRecording(id){
  const data = SPEAKING_DATA[id];
  spState.phase = 'recording';
  let s = data.recT;
  const totalRecT = data.recT;
  document.getElementById('spMic').style.background = '#ff3b3b';

  document.getElementById('spLabel').innerHTML = '🔴 Recording... speak now';
  document.getElementById('spTimerBig').textContent = fmtT(s);
  animateSpWaveform(true);
  spRecognizer = createSpRecognizer({
    maxMs: totalRecT*1000 + 1500,

      document.getElementById('spMic').style.background = data.color;

  });

    s--;

let spRecognizer = null;
function createSpRecognizer(opts){
  const Ctor = window.SpeechRecognition || window.webkitSpeechRecognition || null;
  if (!Ctor){
    opts.onError('Speech recognition is not supported in this browser. Try Chrome, Edge, or Safari.');
    return null;
  }
  const rec = new Ctor();
  rec.lang = 'en-US';
  rec.continuous = true;
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  let finalTranscript = '';
  let stopTimer = null;
  rec.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++){
      if (e.results[i].isFinal) finalTranscript += ' ' + e.results[i][0].transcript;
    }
  };
  rec.onerror = (e) => {
    if (e.error === 'no-speech') return;
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed'){
      opts.onError('Microphone access was blocked. Please allow microphone permission and try again.');
    } else {
      opts.onError('Speech recognition error (' + e.error + '). Tap Begin to try again.');
    }
  };
  rec.onend = () => { clearTimeout(stopTimer); opts.onEnd(finalTranscript.trim()); };
  try{
    rec.start();
    if (opts.maxMs) stopTimer = setTimeout(()=>{ try{ rec.stop(); }catch(e){} }, opts.maxMs);
  }catch(startErr){
    opts.onError('Could not start the microphone. Tap Begin to try again.');
    return null;
  }
  return rec;
}
function spNormalizeWords(s){
  return (s||'').toLowerCase().replace(/[^a-z0-9'\s]/g,' ').split(/\s+/).filter(Boolean);
}

function finishSpRecording(id, transcript){
  const data = SPEAKING_DATA[id];
  animateSpWaveform(false);
  document.getElementById('spMic').style.background = data.color;
  document.getElementById('spMic').style.animation = '';
  document.getElementById('spLabel').textContent = '⏳ Scoring your response...';
  setTimeout(()=>{
    document.getElementById('spLabel').textContent = '✅ Response captured';
    const fb = document.getElementById('spFeedback');
    fb.classList.remove('hidden');

    const wordCount = spNormalizeWords(transcript).length;
    // Length/Development: did the student speak for a reasonable share of the allotted time
    // and produce a substantive amount of content. A completeness proxy, not a grammar/idea judgment.
    const expectedWords = Math.max(15, Math.round(data.recT * 1.8));
    const lengthRatio = Math.min(1, wordCount / expectedWords);
    const devScore = Math.max(0.5, Math.min(5, lengthRatio * 5));

    // Relevance: keyword overlap between the response and the prompt + model sample answer,
    // to catch off-topic or empty responses — not a measure of argument quality.
    const refWords = new Set([...spNormalizeWords(data.prompt), ...spNormalizeWords(data.sample)].filter(w => w.length > 3));
    const saidWords = spNormalizeWords(transcript);
    const overlap = saidWords.filter(w => refWords.has(w)).length;
    const hasSubstance = wordCount >= 8;
    const topicScore = hasSubstance ? Math.max(1.5, Math.min(5, 2.5 + overlap*0.3)) : Math.max(0.3, wordCount*0.25);

    // Delivery: no real audio-timing/pronunciation analysis is possible from a browser,
    // so this mirrors the length signal as a rough completeness stand-in, clearly labeled below.
    const delScore = devScore;

    const fmt1 = n => n.toFixed(1)+'/5';
    document.getElementById('spRubric').innerHTML = `
      <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)"><div><div style="font-weight:600;font-size:13.5px">Response Length</div><div style="font-size:12px;color:var(--ink-faint)">${wordCount} words transcribed (~${expectedWords} expected for ${data.recT}s)</div></div><div style="font-family:var(--ff-mono);font-weight:700;color:${data.color}">${fmt1(delScore)}</div></div>
      <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)"><div><div style="font-weight:600;font-size:13.5px">On-Topic Signal</div><div style="font-size:12px;color:var(--ink-faint)">${overlap} key terms from the prompt detected</div></div><div style="font-family:var(--ff-mono);font-weight:700;color:${data.color}">${fmt1(topicScore)}</div></div>
      <div style="display:flex;justify-content:space-between;padding:9px 0"><div><div style="font-weight:600;font-size:13.5px">Topic Development</div><div style="font-size:12px;color:var(--ink-faint)">Based on length + relevance combined</div></div><div style="font-family:var(--ff-mono);font-weight:700;color:${data.color}">${fmt1((devScore+topicScore)/2)}</div></div>`;
    document.getElementById('spTranscript').innerHTML = transcript
      ? `<strong>What we heard:</strong> "${transcript.length>220?transcript.slice(0,220)+'…':transcript}"`
      : `<em>No speech was detected.</em>`;
    document.getElementById('spSample').innerHTML = `<strong style="color:${data.color}">✅ Sample high-score response:</strong> ${data.sample}` +
      `<div style="margin-top:10px;font-size:11.5px;color:var(--ink-faint);line-height:1.6">This scores how much you said and whether it relates to the prompt — not your grammar, pronunciation, or idea quality. Real TOEFL Speaking scoring evaluates those too, which a browser can't measure on its own. Compare your transcript above to the sample response to see what a strong answer includes.</div>`;
    markQuestDone('speaking_'+id, data.type==='Independent'?50:60, data.title+' complete');
  }, 600);
}

function fmtT(s){ return `0:${String(s).padStart(2,'0')}`; }

    if(boss && !STATE.bossesDone[id]){
      markBossDone(id, e.data.scores, boss.xp);
    }
  }
  if(e.data === 'closeMock' || (e.data && e.data.type==='closeMock')){
    closeBossEmbed();
    renderBossesHub();
  }
});
